<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoffeeCode App</title>
    <link rel="stylesheet" href="templates/styles.css">
</head>
<body>
    <h1>CoffeeCode</h1>
    
    <div class="promociones" id="contenedor-promos">
        <h2>Promociones del Día</h2>
        <div id="promociones"></div>
    </div>

    <div class="container">
        <h2>Menú de Productos Disponibles</h2>
        
        <div id="filtros" style="text-align: center; margin-bottom: 20px;">
            <button onclick="filtrarMenu('todos')" style="width: auto; padding: 5px 15px;">Todos</button>
            <button onclick="filtrarMenu('baratos')" style="width: auto; padding: 5px 15px;">Baratos (<= $40)</button>
            <button onclick="filtrarMenu('caros')" style="width: auto; padding: 5px 15px;">Premium (> $60)</button>
            <button onclick="filtrarMenu('bebidas')" style="width: auto; padding: 5px 15px;">Solo Bebidas</button>
            <button onclick="filtrarMenu('postres')" style="width: auto; padding: 5px 15px;">Solo Postres</button>
        </div>

        <div id="menu"></div>
    </div>
    
    <div class="container">
        <h2>Realizar Pedido</h2>
        <label for="producto">Producto:</label>
        <input type="text" id="producto" placeholder="Ej. Mokka">
        
        <label for="cantidad">Cantidad:</label>
        <input type="number" id="cantidad" placeholder="1" min="1" value="1">
        
        <button onclick="agregarAlPedido()">Agregar al Pedido</button>
        <button onclick="mostrarResumen()" style="background-color: #4a3b32;">Finalizar Pedido</button>
        
        <div id="mensaje" class="mensaje"></div>
    </div>

    <div class="container">
        <h2>Resumen del Pedido</h2>
        <div id="resumen">No has agregado ningún producto.</div>
    </div>

    <div class="container" id="seguimiento-pedido" style="display: none;">
        <h2>Seguimiento de tu Pedido</h2>
        <div class="pasos-seguimiento">
            <div class="paso" id="paso-recibido">
                <span class="icono">✓</span>
                <span class="nombre-paso">Pedido Recibido</span>
            </div>
            <div class="paso" id="paso-preparando">
                <span class="icono">✓</span>
                <span class="nombre-paso">Preparando</span>
            </div>
            <div class="paso" id="paso-empacando">
                <span class="icono">✓</span>
                <span class="nombre-paso">Empacando</span>
            </div>
            <div class="paso" id="paso-final">
                <span class="icono" id="icono-final">✓</span>
                <span class="nombre-paso" id="nombre-final">Estado Final</span>
            </div>
        </div>
        <div id="barra-progreso-contenedor">
            <div id="barra-progreso"></div>
        </div>
        <div id="estado-texto" class="mensaje"></div>
    </div>

    <script src="moduloCatalogo.js"></script>
    <script src="moduloCaja.js"></script>
    <script src="webApp.js"></script>
</body>
</html>
